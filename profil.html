    <nav class="navbar-nav">
      <a class="navbar-btn" href="carte.html" title="Retour à la carte">

        <span>Carte</span>
      </a>
      <a class="navbar-btn" href="a-propos.html" title="À propos du projet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>À propos</span>
      </a>
      <a class="navbar-btn" href="api/index.html" target="_blank" rel="noopener" title="API des refuges">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>API</span>
      </a>
      <button class="navbar-btn btn-theme" onclick="basculerTheme()" title="Changer de thème">
        <svg class="ico-lune" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ico-soleil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <span>Thème</span>
      </button>

    <a class="navbar-btn navbar-profil actif" href="profil.html" title="Mon profil">

      <span>Profil</span>

  </header>

  <div class="page-profil">
    <h1>
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="24" height="24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      Mon profil
    </h1>
    <div id="profil-contenu">
      <div class="profil-carte" style="text-align:center;color:var(--txt3);padding:40px 20px">Chargement…</div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="config.js"></script>
<script src="auth.js"></script>
<script src="utils.js"></script>
<script src="passages.js"></script>
<script src="profil.js"></script>
<script>
  // Chargement minimal : pas de carte ici, juste les refuges (pour les stats)
  // et les passages du compte connecté.
  async function chargerDonneesProfil(){
    await initAuth();

    let refugesData = [];
    try{
      const TAILLE_PAGE = 1000;
      let debut = 0, data = [];
      while(true){
        const { data: page, error } = await supabaseClient.from('refuges').select('id,nom,altitude,categorie').range(debut, debut+TAILLE_PAGE-1);
        if(error) throw error;
        data = data.concat(page);
        if(page.length < TAILLE_PAGE) break;
        debut += TAILLE_PAGE;
      }
      refugesData = data.map(r => ({ id:r.id, nom:r.nom, alt:r.altitude, cat:r.categorie }));
    }catch(e){ console.warn('Chargement refuges (profil) échoué:', e); }

    window.REFUGES = refugesData;
    await chargerPassagesDepuisSupabase();
    rendreProfilComplet();
  }
  chargerDonneesProfil();

  // Thème clair/sombre sauvegardé (même logique que carte.html)
  (function(){
    try {
      if(localStorage.getItem('refuges_theme')==='clair') document.body.classList.add('theme-clair');
    } catch(e){}
  })();
  function basculerTheme(){
    const clair = document.body.classList.toggle('theme-clair');
    try { localStorage.setItem('refuges_theme', clair ? 'clair' : 'sombre'); } catch(e){}
  }
</script>
</body>
</html>
