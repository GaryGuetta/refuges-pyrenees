<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Générateur d'API — Refuges des Pyrénées</title>
<style>
  body{font-family:system-ui,sans-serif;background:#101114;color:#f3f1ea;max-width:640px;margin:40px auto;padding:0 20px;line-height:1.6}
  h1{font-size:20px}h1 span{color:#f0a04b}
  button{background:#f0a04b;color:#201304;border:none;border-radius:10px;padding:12px 20px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit}
  button:disabled{opacity:.5}
  #log{background:#1d1f24;border-radius:12px;padding:14px;font-family:monospace;font-size:12.5px;white-space:pre-wrap;margin-top:16px;min-height:80px}
  a{color:#f0a04b}
</style>
</head>
<body>
<h1>Générateur d'API — <span>Refuges des Pyrénées</span></h1>
<p>Ouvre cette page avec Live Server, clique sur le bouton : les fichiers de l'API
sont téléchargés. Place-les ensuite dans le dossier <code>api/</code> de ton site avant de déployer.</p>
<button onclick="generer()" id="btn">Générer les fichiers de l'API</button>
<div id="log">Prêt.</div>

<script>
const REGIONS=['Andorre','Occitanie','Nouvelle-Aquitaine'];
const TYPE_LABEL={1:'Cabane fermée',2:'Cabane ouverte',3:"Cabane ouverte, occupée par le berger l'été",4:'Orri, toue, abri en pierre',5:"Refuge gardé l'été, partie hivernale",6:"Refuge gardé toute l'année",7:'Ruine'};
const categorie=t=>{t=+t;if(t===5||t===6)return'refuge';if(t===2||t===3)return'libre';if(t===1||t===4)return'cabane';if(t===7)return'ruine';return'cabane'};
const slug=s=>s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase().replace(/[^a-z0-9]+/g,'-');
const log=m=>document.getElementById('log').textContent+='\n'+m;

async function chargerRegion(region){
  const url=`https://www.pyrenees-refuges.com/api.php?type_fichier=GEOJSON&region=${encodeURIComponent(region)}`;
  const rep=await fetch(url);
  if(!rep.ok)throw new Error(region+' HTTP '+rep.status);
  const data=await rep.json();
  return (data.features||[]).map(f=>{
    const g=f.geometry;if(g?.type!=='Point')return null;
    const [lon,lat,altG]=g.coordinates;
    const p=f.properties||{};
    const t=p.type_lieu??p.type??p.categorie;
    const desc=(p.description||p.commentaire||p.info||'').toString().replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim();
    return {
      id:slug(`${p.nom||p.name||'sans-nom'}-${lat.toFixed(4)}-${lon.toFixed(4)}`),
      nom:p.nom||p.name||p.title||'Sans nom',
      lat,lon,
      altitude:p.altitude||p.alt||(altG?Math.round(altG):null),
      region,
      places:p.places||p.capacite||null,
      eau:p.eau||p.eau_proximite||p.point_eau||p.water||null,
      bois:p.bois||p.bois_proximite||p.foret||p.wood||null,
      type_num:+t||null,
      type_libelle:TYPE_LABEL[+t]||null,
      categorie:categorie(t),
      description:desc||null,
      lien:p.url||p.lien||null
    };
  }).filter(Boolean).filter(r=>r.lat&&r.lon);
}

function telecharger(nom,contenu){
  const b=new Blob([contenu],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(b);a.download=nom;a.click();
  URL.revokeObjectURL(a.href);
}

function versGeoJSON(refuges){
  return {type:'FeatureCollection',features:refuges.map(r=>({
    type:'Feature',
    geometry:{type:'Point',coordinates:r.altitude!=null?[r.lon,r.lat,r.altitude]:[r.lon,r.lat]},
    properties:Object.fromEntries(Object.entries(r).filter(([k])=>k!=='lat'&&k!=='lon'))
  }))};
}

async function generer(){
  const btn=document.getElementById('btn');btn.disabled=true;
  try{
    const parRegion={};
    for(const region of REGIONS){
      log('Chargement '+region+'…');
      parRegion[region]=await chargerRegion(region);
      log('  → '+parRegion[region].length+' lieux');
    }
    const tous=Object.values(parRegion).flat();
    const meta={
      source:'pyrenees-refuges.com',
      licence:'Données © pyrenees-refuges.com — merci de conserver l’attribution',
      genere_le:new Date().toISOString(),
      nombre:tous.length,regions:REGIONS,
      categories:{refuge:'Refuge gardé',libre:'Cabane ouverte',cabane:'Cabane / abri',ruine:'Ruine'}
    };
    telecharger('refuges.json',JSON.stringify({meta,refuges:tous},null,1));
    telecharger('refuges.geojson',JSON.stringify(versGeoJSON(tous)));
    for(const region of REGIONS){
      telecharger(`refuges-${slug(region)}.json`,
        JSON.stringify({meta:{...meta,nombre:parRegion[region].length,regions:[region]},refuges:parRegion[region]},null,1));
    }
    for(const cat of ['refuge','libre','cabane','ruine']){
      const sel=tous.filter(r=>r.categorie===cat);
      telecharger(`refuges-cat-${cat}.json`,JSON.stringify({meta:{...meta,nombre:sel.length},refuges:sel},null,1));
    }
    log('\n✓ '+tous.length+' lieux — 9 fichiers téléchargés. Copie-les dans le dossier api/ du site.');
  }catch(e){log('✗ Échec : '+e.message)}
  btn.disabled=false;
}
</script>
</body>
</html>
