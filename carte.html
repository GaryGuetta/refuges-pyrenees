<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Refuges des Pyrénées</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app">
  <!-- Barre de navigation -->
  <header class="navbar">
    <a class="navbar-logo" href="index.html">
      <svg viewBox="0 0 44 40" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 33 L15 12 L22 24 L28 14 L41 33"/>
        <circle cx="34" cy="7" r="3.4" fill="var(--accent)" stroke="none"/>
      </svg>
      <span>Refuges des <b>Pyrénées</b></span>
    </a>
    <nav class="navbar-nav">
      <a class="navbar-btn" href="a-propos.html" title="À propos du projet">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        <span>À propos</span>
      </a>
      <a class="navbar-btn" href="api/index.html" target="_blank" rel="noopener" title="API des refuges — données en JSON/GeoJSON">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        <span>API</span>
      </a>
      <button class="navbar-btn btn-ajouter-refuge" onclick="toggleModeAjout()" title="Ajouter un refuge">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        <span>Ajouter</span>
      </button>
      <button class="navbar-btn" onclick="basculerFond()" title="Changer de fond de carte">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>
        <span id="lbl-fond">Sombre</span>
      </button>
      <button class="navbar-btn btn-theme" onclick="basculerTheme()" title="Changer de thème">
        <svg class="ico-lune" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="ico-soleil" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.2 4.2l1.4 1.4M18.4 18.4l1.4 1.4M1 12h2M21 12h2M4.2 19.8l1.4-1.4M18.4 5.6l1.4-1.4"/></svg>
        <span>Thème</span>
      </button>
    </nav>
    <a class="navbar-btn navbar-profil" href="profil.html" title="Mon profil">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
      <span>Profil</span>
    </a>
  </header>

  <div class="corps">
    <!-- Panneau liste, collé au bord -->
    <aside class="panneau">
      <div class="filtres" id="filtres-bloc">
        <input type="text" class="recherche" id="recherche" placeholder="Rechercher un lieu, un département…"
               oninput="recherche=this.value;appliquer()">
      </div>
      <div class="stats">
        <div class="stat stat-unique"><div class="stat-num c" id="s-total">—</div><div class="stat-lbl">Lieux référencés</div></div>
      </div>
      <div class="zones" id="zones"></div>
      <div class="liste" id="liste"><div class="etat"><div class="spin"></div>Chargement des refuges…<div class="progres" id="progres"></div></div></div>
    </aside>

    <!-- Zone carte : tout ce qui flotte ici reste ancré à cette zone, pas à toute la page -->
    <div class="zone-carte">
      <div id="map"></div>

      <!-- Bouton mobile : ouvre/ferme la liste + recherche en feuille plein écran -->
      <button class="btn-liste-mobile" onclick="document.querySelector('.app').classList.toggle('mobile-liste-ouverte')" aria-label="Liste des refuges et recherche">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
        Liste &amp; recherche
      </button>

      <!-- Bandeau affiché pendant le placement d'un nouveau refuge -->
      <div class="bandeau-ajout" id="bandeau-ajout">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>Clique sur la carte à l'endroit du nouveau refuge</span>
        <button onclick="toggleModeAjout()">Annuler</button>
      </div>
      <button class="autour-moi" onclick="autourDeMoi()" title="Refuges autour de moi" aria-label="Refuges autour de moi">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
        <span>Autour de moi</span>
      </button>

      <!-- Drawer détail -->
      <aside class="detail" id="detail">
        <div class="detail-vide" id="detail-vide">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <p>Sélectionne un lieu sur la carte<br>pour voir le détail</p>
        </div>
        <div class="detail-contenu" id="detail-contenu" style="display:none"></div>
      </aside>
    </div>
  </div>
</div>

<!-- Page fiche plein écran -->
<div class="fiche-overlay" id="fiche-overlay"></div>

<!-- Visionneuse photo plein écran -->
<div class="photo-overlay" id="photo-overlay">
  <button class="photo-overlay-fermer" onclick="fermerPhotoPlein()" aria-label="Fermer">&times;</button>
  <button class="photo-overlay-nav prev" onclick="photoSuivante(-1)" aria-label="Photo précédente">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <img id="photo-overlay-img" src="" alt="Photo en plein écran">
  <button class="photo-overlay-nav next" onclick="photoSuivante(1)" aria-label="Photo suivante">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <div class="modal-tete">
      <h2>Modifier le lieu</h2>
      <button class="modal-fermer" onclick="fermerEdition()">&times;</button>
    </div>
    <div class="modal-corps">
      <div class="champ">
        <label>Nom</label>
        <input type="text" id="e-nom">
      </div>
      <div class="champ">
        <label>Altitude (m)</label>
        <input type="number" id="e-alt">
      </div>
      <div class="champ">
        <label>Type</label>
        <select id="e-type">
          <option value="refuge">Refuge gardé</option>
          <option value="libre">Cabane ouverte</option>
          <option value="cabane">Cabane / abri</option>
          <option value="ruine">Ruine</option>
        </select>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Eau à proximité</label>
          <select id="e-eau"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
        <div class="champ"><label>Bois</label>
          <select id="e-bois"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
      </div>
      <div class="champ">
        <label>Mois où l'eau est disponible</label>
        <div class="mois-edit" id="e-mois"></div>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Ville / hameau le plus proche</label><input type="text" id="e-ville"></div>
        <div class="champ"><label>Cheminée</label>
          <select id="e-cheminee"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Capacité été</label><input type="number" id="e-cap-ete"></div>
        <div class="champ"><label>Capacité hiver</label><input type="number" id="e-cap-hiver"></div>
      </div>
      <div class="champ">
        <label>Couchage (précisions)</label>
        <input type="text" id="e-couchage" placeholder="Ex : place pour 4 sur la mezzanine">
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Latitude</label><input type="number" step="0.00001" id="e-lat"></div>
        <div class="champ"><label>Longitude</label><input type="number" step="0.00001" id="e-lon"></div>
      </div>
      <div class="champ">
        <label>Description</label>
        <textarea id="e-desc"></textarea>
      </div>
    </div>
    <div class="modal-pied">
      <button class="btn btn-reset" onclick="reinitialiserLieu()">Rétablir l'original</button>
      <div style="display:flex;gap:10px">
        <button class="btn btn-annuler" onclick="fermerEdition()">Annuler</button>
        <button class="btn btn-save" onclick="enregistrerEdition()">Enregistrer</button>
      </div>
    </div>
  </div>
</div>

<div class="overlay" id="overlay-ajout">
  <div class="modal">
    <div class="modal-tete">
      <h2>Ajouter un refuge</h2>
      <button class="modal-fermer" onclick="fermerFormulaireAjout()">&times;</button>
    </div>
    <div class="modal-corps">
      <div class="champ">
        <label>Nom</label>
        <input type="text" id="a-nom" placeholder="Ex : Cabane de...">
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Altitude (m)</label><input type="number" id="a-alt"></div>
        <div class="champ"><label>Type</label>
          <select id="a-type">
            <option value="refuge">Refuge gardé</option>
            <option value="libre">Cabane ouverte</option>
            <option value="cabane" selected>Cabane / abri</option>
            <option value="ruine">Ruine</option>
          </select>
        </div>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Eau à proximité</label>
          <select id="a-eau"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
        <div class="champ"><label>Bois</label>
          <select id="a-bois"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Ville / hameau le plus proche</label><input type="text" id="a-ville"></div>
        <div class="champ"><label>Cheminée</label>
          <select id="a-cheminee"><option value="">—</option><option value="Oui">Oui</option><option value="Non">Non</option></select>
        </div>
      </div>
      <div class="champ-duo">
        <div class="champ"><label>Latitude</label><input type="number" step="0.00001" id="a-lat"></div>
        <div class="champ"><label>Longitude</label><input type="number" step="0.00001" id="a-lon"></div>
      </div>
      <div class="champ">
        <label>Description</label>
        <textarea id="a-desc" placeholder="État du lieu, accès, particularités…"></textarea>
      </div>
    </div>
    <div class="modal-pied">
      <div></div>
      <div style="display:flex;gap:10px">
        <button class="btn btn-annuler" onclick="fermerFormulaireAjout()">Annuler</button>
        <button class="btn btn-save" onclick="enregistrerNouveauRefuge()">Ajouter ce refuge</button>
      </div>
    </div>
  </div>
</div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/leaflet.markercluster.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="config.js"></script>
  <script src="auth.js"></script>
  <script src="utils.js"></script>
  <script src="carte.js"></script>
  <script src="eau.js"></script>
  <script src="passages.js"></script>
  <script src="edition.js"></script>
  <script src="ajout-refuge.js"></script>
  <script src="detail.js"></script>
  <script src="photos.js"></script>
  <script src="fiche.js"></script>
  <script src="refuges.js"></script>
  <script src="zones.js"></script>
  <script src="geoloc.js"></script>
  <script src="meteo.js"></script>
  <script src="profil.js"></script>
  <script>initCarte();</script>
</body>
</html>
